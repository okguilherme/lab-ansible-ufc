---
- name: Automação de Certificados SSL - Estágio UFC Quixadá
  hosts: servidores
  become: yes

  tasks:
    # --- APACHE PADRÃO (Dunas, Romeirão, Mangueirão) ---
    - name: Atualizar Apache Padrão
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
      loop:
        - { src: "certificado_estagio.cert", dest: "/etc/ssl/certs/_.quixada.ufc.br.cer" }
        - { src: "intemediate_estagio.pem", dest: "/etc/ssl/certs/intermediate-2020.pem" }
        - { src: "gs_root_estagio.pem", dest: "/etc/ssl/certs/gs_root.pem" }
        - { src: "quixada_estagio.key", dest: "/etc/ssl/private/newquixada.key" }
      when: inventory_hostname in ['dunas-moodle', 'romeirao', 'mangueirao']
      notify: Restart Apache

    # --- ALMOXARIFADO (Caminho Específico) ---
    - name: Atualizar Almoxarifado
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
      loop:
        - { src: "certificado_estagio.cert", dest: "/etc/ssl/certs/chaves/curinga.quixada.ufc.br.cer" }
        - { src: "intemediate_estagio.pem", dest: "/etc/ssl/certs/chaves/intermediate.pem" }
        - { src: "gs_root_estagio.pem", dest: "/etc/ssl/certs/chaves/gs_root.pem" }
        - { src: "quixada_estagio.key", dest: "/etc/ssl/certs/chaves/newquixada.key" }
      when: inventory_hostname == "almoxarifado"
      notify: Restart Apache

    # --- BUNDLES (Marizão, Independência, Email, Coliseu) ---
    - name: Gerar Bundles Unificados
      ansible.builtin.copy:
        dest: "{{ item.dest }}"
        content: |
          {{ lookup('file', 'certificado_estagio.cert') }}
          {{ lookup('file', 'intemediate_estagio.pem') }}
          {{ lookup('file', 'gs_root_estagio.pem') }}
          {% if item.include_key %}{{ lookup('file', 'quixada_estagio.key') }}{% endif %}
      loop:
        - { dest: "/opt/sistemas/gitlab/config/certs/git2.quixada.ufc.br.crt", include_key: false, name: "marizao-gitlab" }
        - { dest: "/etc/ssl/certs/haproxy.pem", include_key: true, name: "independencia-haproxy" }
        - { dest: "/etc/ssl/certs/iRedMail.crt", include_key: false, name: "email-iredmail" }
        - { dest: "/etc/nginx/certs/quixada.ufc.br.chained.crt", include_key: false, name: "coliseu-sonar" }
      when: inventory_hostname == item.name
      notify: "Restart {{ 'Docker' if 'gitlab' in item.dest or 'haproxy' in item.dest else 'Service' }}"

    # --- PARAMBU (Nginx Simples) ---
    - name: Atualizar Parambu (Nginx)
      ansible.builtin.copy:
        src: "certificado_estagio.cert"
        dest: "/etc/nginx/ssl/_.quixada.ufc.br.crt"
      when: inventory_hostname == "parambu"
      notify: Restart Nginx

    # --- VPL (Colina) ---
    - name: Atualizar VPL (Colina)
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
      loop:
        - { src: "certificado_estagio.cert", dest: "/etc/vpl/cert.pem" }
        - { src: "quixada_estagio.key", dest: "/etc/vpl/key.pem" }
      when: inventory_hostname == "colina-vpl"
      notify: Restart VPL

  handlers:
    - name: Restart Apache
      ansible.builtin.service:
        name: apache2
        state: restarted
    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded
    - name: Restart Docker
      ansible.builtin.shell: "docker restart {{ inventory_hostname.split('-')[1] }}"
    - name: Restart VPL
      ansible.builtin.service:
        name: vpl-jail-system
        state: restarted
